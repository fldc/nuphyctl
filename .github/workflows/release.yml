name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Validate tag version
        run: |
          expected_tag="v$(python3 - <<'PY'
          import tomllib

          with open('Cargo.toml', 'rb') as fh:
              cargo = tomllib.load(fh)

          print(cargo['package']['version'])
          PY
          )"
          if [ "$expected_tag" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${expected_tag}" >&2
            exit 1
          fi
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
          install-libudev: 'true'
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features

  build-linux:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            cross: false
          - target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            cross: true
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Install native build dependencies
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libhidapi-dev

      - name: Install strip tool
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            strip target/${{ matrix.target }}/release/nuphyctl
          else
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/nuphyctl
          fi

      - name: Package binary
        run: |
          mkdir package
          cp target/${{ matrix.target }}/release/nuphyctl package/
          cp README.md LICENSE package/
          tar -C package -czf nuphyctl-${{ github.ref_name }}-${{ matrix.name }}.tar.gz nuphyctl README.md LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuphyctl-${{ matrix.name }}
          path: nuphyctl-${{ github.ref_name }}-${{ matrix.name }}.tar.gz

  create-release:
    name: Create Release
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
