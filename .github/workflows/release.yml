name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Validate tag version
        run: |
          expected_tag="v$(python3 - <<'PY'
          import tomllib

          with open('Cargo.toml', 'rb') as fh:
              cargo = tomllib.load(fh)

          print(cargo['package']['version'])
          PY
          )"
          if [ "$expected_tag" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${expected_tag}" >&2
            exit 1
          fi
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
          install-libudev: 'true'
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features

  build-linux:
    name: Build Linux binaries
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust
        with:
          install-libudev: 'true'
          targets: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo python3 - <<'PY'
          from pathlib import Path

          path = Path('/etc/apt/sources.list.d/ubuntu.sources')
          text = path.read_text()
          lines = []
          for line in text.splitlines():
              lines.append(line)
              if line.startswith('Suites:'):
                  lines.append('Architectures: amd64')
          path.write_text('\n'.join(lines) + '\n')
          PY
          sudo bash -c 'echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" > /etc/apt/sources.list.d/arm64.list'
          sudo bash -c 'echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" >> /etc/apt/sources.list.d/arm64.list'
          sudo bash -c 'echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" >> /etc/apt/sources.list.d/arm64.list'
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libudev-dev:arm64

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            strip target/${{ matrix.target }}/release/nuphyctl
          else
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/nuphyctl
          fi

      - name: Package binary
        run: |
          mkdir package
          cp target/${{ matrix.target }}/release/nuphyctl package/
          cp README.md LICENSE package/
          tar -C package -czf nuphyctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz nuphyctl README.md LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v8
        with:
          name: nuphyctl-${{ matrix.target }}
          path: nuphyctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  create-release:
    name: Create Release
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
